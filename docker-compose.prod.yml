# Production-like backend stack. Override secrets via a .env file or your
# orchestrator's secret store — do NOT ship the defaults below.
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-hapharef_db}
      POSTGRES_USER: ${DB_USER:-hapharef_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hapharef_admin} -d ${DB_NAME:-hapharef_db}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:?set ALLOWED_HOSTS}
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-hapharef_db}
      - DB_USER=${DB_USER:-hapharef_admin}
      - DB_PASSWORD=${DB_PASSWORD:?set DB_PASSWORD}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:?set CSRF_TRUSTED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
