services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hapharef_db
      POSTGRES_USER: hapharef_admin
      POSTGRES_PASSWORD: secure_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapharef_admin -d hapharef_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - SECRET_KEY=dev-insecure-change-me-in-production
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,web
      - DB_HOST=db
      - DB_NAME=hapharef_db
      - DB_USER=hapharef_admin
      - DB_PASSWORD=secure_dev_password
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - CSRF_TRUSTED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
